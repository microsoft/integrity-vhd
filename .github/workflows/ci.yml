name: CI
on:
  push:
    branches:
      - main
  pull_request:

env:
  GO_VERSION: "1.22.x"

jobs:
  roothash-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run dm-verity roothash tests
        run: go test ./cmd/dmverity-vhd -run TestRootHash -count=1 -v
